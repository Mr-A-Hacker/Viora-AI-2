<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Security Camera</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .header {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 { font-size: 1.5rem; color: #00d4ff; }
        .status-badge {
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        .status-armed { background: #00ff88; color: #000; }
        .status-disarmed { background: #ff4444; color: #fff; }
        .status-alarm { background: #ff0000; color: #fff; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .container {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .video-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }
        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
        }
        .video-container img { width: 100%; height: 100%; object-fit: cover; }
        .overlay-info {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        .timestamp {
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 12px;
            border-radius: 5px;
            font-family: monospace;
        }
        .detection-badge {
            background: rgba(255, 165, 0, 0.8);
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.85rem;
            display: none;
        }
        .controls-section { display: flex; flex-direction: column; gap: 15px; }
        .control-panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
        }
        .control-panel h3 { margin-bottom: 15px; color: #00d4ff; font-size: 1rem; }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        .btn-arm { background: #00ff88; color: #000; }
        .btn-disarm { background: #ff4444; color: #fff; }
        .btn-defuse { background: #ffa500; color: #000; }
        .btn-capture { background: #00d4ff; color: #000; }
        .btn-alarm { background: #ff0000; color: #fff; }
        .btn:hover { transform: scale(1.02); box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .status-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        .status-item label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 5px; }
        .status-item span { font-size: 1.2rem; font-weight: bold; }
        .recording-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff0000;
            padding: 5px 15px;
            border-radius: 5px;
            display: none;
        }
        .recording-indicator.active { display: block; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .alerts-panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        .alert-item {
            background: rgba(255, 0, 0, 0.2);
            border-left: 3px solid #ff4444;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            font-size: 0.85rem;
        }
        .alert-item.motion { background: rgba(255, 165, 0, 0.2); border-left-color: #ffa500; }
        .alert-item.info { background: rgba(0, 212, 255, 0.2); border-left-color: #00d4ff; }
        .alert-item.success { background: rgba(0, 255, 136, 0.2); border-left-color: #00ff88; }
        .empty-state { text-align: center; color: #666; padding: 20px; }
        .logout-btn {
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
        }

        /* Motion Alert Popup */
        .motion-popup {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .motion-popup.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .motion-popup-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 2px solid #ff4444;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.5);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .motion-popup-content h2 {
            color: #ff4444;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .motion-popup-content .icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }
        .motion-popup-content p {
            color: #ccc;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        .popup-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .popup-buttons .btn {
            width: auto;
            padding: 15px 40px;
            font-size: 1.1rem;
            margin-bottom: 0;
        }
        .btn-yes {
            background: #ff0000;
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }
        .btn-yes:hover { background: #cc0000; }
        .btn-no {
            background: #333;
            color: #fff;
        }
        .btn-no:hover { background: #555; }
        .popup-timestamp {
            color: #666;
            font-size: 0.8rem;
            margin-top: 20px;
        }

        /* Alarm Active Overlay */
        .alarm-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 0, 0, 0.15);
            z-index: 999;
            pointer-events: none;
        }
        .alarm-overlay.active {
            display: block;
            animation: alarmFlash 0.5s infinite;
        }
        @keyframes alarmFlash { 0%, 100% { background: rgba(255, 0, 0, 0.15); } 50% { background: rgba(255, 0, 0, 0.3); } }

        /* Big Stop Alarm Button Overlay */
        .stop-alarm-overlay {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
        }
        .stop-alarm-overlay.active {
            display: block;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateX(-50%) translateY(20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        .btn-stop-alarm {
            padding: 20px 60px;
            font-size: 1.4rem;
            font-weight: bold;
            background: #ff0000;
            color: #fff;
            border: 3px solid #fff;
            border-radius: 15px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.8), 0 0 60px rgba(255, 0, 0, 0.4);
            animation: stopPulse 1s infinite;
        }
        .btn-stop-alarm:hover {
            background: #cc0000;
            transform: scale(1.05);
        }
        @keyframes stopPulse { 0%, 100% { box-shadow: 0 0 30px rgba(255, 0, 0, 0.8), 0 0 60px rgba(255, 0, 0, 0.4); } 50% { box-shadow: 0 0 50px rgba(255, 0, 0, 1), 0 0 80px rgba(255, 0, 0, 0.6); } }
    </style>
</head>
<body>
    <div class="alarm-overlay" id="alarmOverlay"></div>

    <!-- Big Stop Alarm Button (shows during alarm) -->
    <div class="stop-alarm-overlay" id="stopAlarmOverlay">
        <button class="btn-stop-alarm" onclick="stopAlarm()">STOP ALARM</button>
    </div>

    <!-- Motion Alert Popup -->
    <div class="motion-popup" id="motionPopup">
        <div class="motion-popup-content">
            <div class="icon">INTRUDER ALERT</div>
            <h2>Someone Has Entered Your Room!</h2>
            <p id="popupPrompt">Would you like me to sound an alarm?</p>
            <div class="popup-buttons">
                <button class="btn btn-yes" onclick="respondToAlarm('yes')">YES - SOUND ALARM</button>
                <button class="btn btn-no" onclick="respondToAlarm('no')">NO - CANCEL</button>
            </div>
            <div class="popup-timestamp" id="popupTimestamp"></div>
        </div>
    </div>

    <div class="header">
        <h1>AI Security Camera</h1>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div id="statusBadge" class="status-badge status-disarmed">DISARMED</div>
        </div>
    </div>

    <div class="container">
        <div class="video-section">
            <div class="video-container">
                <img src="/video_feed" id="videoFeed" alt="Live Feed">
                <div class="overlay-info">
                    <div class="timestamp" id="timestamp">--:--:--</div>
                </div>
                <div class="recording-indicator" id="recordingIndicator">REC</div>
            </div>
        </div>

        <div class="controls-section">
            <div class="control-panel">
                <h3>System Control</h3>
                <button class="btn btn-arm" id="armBtn" onclick="armSystem()">ARM SYSTEM</button>
                <button class="btn btn-disarm" id="disarmBtn" onclick="disarmSystem()" disabled>DISARM</button>
                <button class="btn btn-defuse" id="defuseBtn" onclick="defuseAlarm()" style="display: none;">DEFUSE ALARM</button>
            </div>

            <div class="control-panel">
                <h3>Actions</h3>
                <button class="btn btn-capture" onclick="captureImage()">CAPTURE PHOTO</button>
                <button class="btn btn-alarm" onclick="triggerManualAlarm()">MANUAL ALARM</button>
                <button class="btn" style="background: #444; color: #fff;" onclick="stopAlarm()">STOP ALARM</button>
            </div>

            <div class="control-panel">
                <h3>Status</h3>
                <div class="status-grid">
                    <div class="status-item"><label>Motion</label><span id="motionStatus">-</span></div>
                    <div class="status-item"><label>Recording</label><span id="recordingStatus">OFF</span></div>
                    <div class="status-item"><label>Armed</label><span id="armedStatus">NO</span></div>
                    <div class="status-item"><label>Alarm</label><span id="alarmStatus">OFF</span></div>
                </div>
            </div>

            <div class="control-panel">
                <h3>System</h3>
                <div class="status-grid">
                    <div class="status-item"><label>CPU</label><span id="cpuStat">0%</span></div>
                    <div class="status-item"><label>RAM</label><span id="ramStat">0%</span></div>
                    <div class="status-item"><label>TEMP</label><span id="tempStat">0C</span></div>
                    <div class="status-item"><label>Time</label><span id="timeStat">--:--:--</span></div>
                </div>
            </div>

            <div class="alerts-panel">
                <h3 style="margin-bottom: 15px; color: #00d4ff;">Alerts</h3>
                <div id="alertsList"><div class="empty-state">No alerts</div></div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();

        function updateUI(status) {
            const badge = document.getElementById('statusBadge');
            if (status.alarm_triggered) {
                badge.className = 'status-badge status-alarm';
                badge.textContent = 'ALARM!';
                document.getElementById('alarmOverlay').classList.add('active');
            } else if (status.armed) {
                badge.className = 'status-badge status-armed';
                badge.textContent = 'ARMED';
                document.getElementById('alarmOverlay').classList.remove('active');
            } else {
                badge.className = 'status-badge status-disarmed';
                badge.textContent = 'DISARMED';
                document.getElementById('alarmOverlay').classList.remove('active');
            }

            document.getElementById('armBtn').disabled = status.armed;
            document.getElementById('disarmBtn').disabled = !status.armed;
            document.getElementById('defuseBtn').style.display = (status.alarm_triggered) ? 'block' : 'none';
            document.getElementById('recordingIndicator').classList.toggle('active', status.recording);

            document.getElementById('motionStatus').textContent = status.motion_detected ? 'YES' : 'No';
            document.getElementById('motionStatus').style.color = status.motion_detected ? '#ff4444' : '';
            document.getElementById('recordingStatus').textContent = status.recording ? 'ON' : 'OFF';
            document.getElementById('armedStatus').textContent = status.armed ? 'YES' : 'NO';
            document.getElementById('alarmStatus').textContent = status.alarm_triggered ? 'ACTIVE' : 'OFF';
            document.getElementById('alarmStatus').style.color = status.alarm_triggered ? '#ff4444' : '';

            // Hide popup if alarm is no longer active or awaiting
            if (!status.awaiting_response && !status.alarm_triggered) {
                document.getElementById('motionPopup').classList.remove('active');
            }

            // Show/hide big stop alarm button
            if (status.alarm_triggered) {
                document.getElementById('stopAlarmOverlay').classList.add('active');
                document.getElementById('alarmOverlay').classList.add('active');
            } else {
                document.getElementById('stopAlarmOverlay').classList.remove('active');
                document.getElementById('alarmOverlay').classList.remove('active');
            }

            document.getElementById('timestamp').textContent = new Date().toLocaleTimeString();
        }

        function addAlert(message, type = '') {
            const list = document.getElementById('alertsList');
            const empty = list.querySelector('.empty-state');
            if (empty) empty.remove();

            const alert = document.createElement('div');
            alert.className = 'alert-item ' + type;
            alert.innerHTML = '<strong>' + new Date().toLocaleTimeString() + '</strong><br>' + message;
            list.insertBefore(alert, list.firstChild);

            if (list.children.length > 20) list.removeChild(list.lastChild);
        }

        function armSystem() {
            fetch('/arm', { method: 'POST' }).then(() => {
                addAlert('System ARMED - watching for motion', 'info');
            });
        }

        function disarmSystem() {
            fetch('/disarm', { method: 'POST' }).then(() => {
                addAlert('System DISARMED', 'info');
                document.getElementById('motionPopup').classList.remove('active');
                document.getElementById('alarmOverlay').classList.remove('active');
            });
        }

        function defuseAlarm() {
            fetch('/defuse', { method: 'POST' }).then(() => {
                addAlert('Alarm DEFUSED', 'success');
                document.getElementById('motionPopup').classList.remove('active');
                document.getElementById('alarmOverlay').classList.remove('active');
            });
        }

        function respondToAlarm(answer) {
            fetch('/alarm_response', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ answer: answer })
            })
            .then(r => r.json())
            .then(data => {
                if (answer === 'yes') {
                    addAlert('ALARM SOUNDED!', 'alarm');
                } else {
                    addAlert('Alarm cancelled by user', 'info');
                }
                document.getElementById('motionPopup').classList.remove('active');
            });
        }

        function captureImage() {
            fetch('/capture', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success') addAlert('Photo captured: ' + data.filename, 'info');
                });
        }

        function triggerManualAlarm() {
            fetch('/manual_alarm', { method: 'POST' }).then(() => {
                addAlert('Manual alarm triggered!', 'alarm');
            });
        }

        function stopAlarm() {
            fetch('/stop_alarm', { method: 'POST' }).then(() => {
                addAlert('Alarm stopped', 'info');
                document.getElementById('motionPopup').classList.remove('active');
                document.getElementById('alarmOverlay').classList.remove('active');
                document.getElementById('stopAlarmOverlay').classList.remove('active');
            });
        }

        // Socket events
        socket.on('system_armed', () => addAlert('System Armed', 'info'));
        socket.on('system_disarmed', () => addAlert('System Disarmed', 'info'));

        socket.on('motion_alert', (data) => {
            addAlert('MOTION: ' + data.message, 'motion');
            // Show the popup
            document.getElementById('popupTimestamp').textContent = 'Detected at: ' + new Date(data.timestamp).toLocaleTimeString();
            document.getElementById('motionPopup').classList.add('active');
        });

        socket.on('alarm_triggered', (data) => {
            addAlert('ALARM TRIGGERED!', 'alarm');
            document.getElementById('alarmOverlay').classList.add('active');
            document.getElementById('stopAlarmOverlay').classList.add('active');
            document.getElementById('motionPopup').classList.remove('active');
        });

        socket.on('alarm_defused', () => {
            addAlert('Alarm Defused', 'success');
            document.getElementById('alarmOverlay').classList.remove('active');
            document.getElementById('stopAlarmOverlay').classList.remove('active');
            document.getElementById('motionPopup').classList.remove('active');
        });

        socket.on('alarm_cancelled', (data) => {
            addAlert('Alarm cancelled', 'info');
            document.getElementById('motionPopup').classList.remove('active');
        });

        socket.on('recording_started', (data) => addAlert('Recording: ' + data.filename, 'info'));

        // Poll status
        setInterval(() => fetch('/api/status').then(r => r.json()).then(updateUI), 1000);

        // Poll system stats
        setInterval(() => {
            fetch('/system/stats').then(r => r.json()).then(data => {
                document.getElementById('cpuStat').textContent = data.cpu_percent + '%';
                document.getElementById('ramStat').textContent = data.memory_percent + '%';
                document.getElementById('tempStat').textContent = Math.round(data.temperature) + 'C';
                document.getElementById('timeStat').textContent = data.time;
            }).catch(() => {});
        }, 2000);

        // Initial state
        updateUI({ armed: false, alarm_triggered: false, motion_detected: false, recording: false, awaiting_response: false });
    </script>
</body>
</html>
